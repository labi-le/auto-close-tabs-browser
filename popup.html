<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Tab Lifecycle Timer</title>
  <style>
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      padding: 14px;
      margin: 0;
      background-color: #ffffff;
    }
    h3 { margin: 0 0 10px 0; font-size: 15px; color: #222; }
    
    /* Главный выключатель таймера */
    .master-switch-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background-color: #f1f3f4;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
      font-weight: bold;
    }
    .master-switch-box.paused {
      background-color: #fce8e6;
      color: #c5221f;
    }

    .stat-box {
      background-color: #f1f3f4;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      color: #5f6368;
      margin-bottom: 12px;
    }
    .stat-box strong { color: #1a73e8; }
    
    .tab-protect-box {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px;
      background-color: #e8f0fe;
      border-radius: 6px;
      font-size: 12px;
      color: #1967d2;
      margin-bottom: 12px;
      font-weight: 500;
    }
    
    /* Общие стили Toggle Switches */
    .switch { position: relative; display: inline-block; width: 34px; height: 20px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background-color: #dadce0; transition: .2s; border-radius: 20px;
    }
    .slider:before {
      position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
      background-color: white; transition: .2s; border-radius: 50%;
    }
    input:checked + .slider { background-color: #1a73e8; }
    input:checked + .slider.master-slider { background-color: #1e8e3e; }
    input:checked + .slider:before { transform: translateX(14px); }

    button {
      width: 100%;
      padding: 8px;
      background-color: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
    }
    button:hover { background-color: #1557b0; }
  </style>
</head>
<body>
  <h3>Tab Lifecycle Timer</h3>
  
  <div id="masterBox" class="master-switch-box">
    <span id="masterStatusText">Таймер работает</span>
    <label class="switch">
      <input type="checkbox" id="pauseTimerCheckbox" checked>
      <span class="slider master-slider"></span>
    </label>
  </div>

  <div class="stat-box">
    Текущий таймаут: <strong id="currentTimeout">-</strong> мин.<br>
    Сберегли памяти: <strong id="ramCounter">0</strong> МБ
  </div>

  <div class="tab-protect-box">
    <span>Игнорировать эту вкладку</span>
    <label class="switch">
      <input type="checkbox" id="protectTabCheckbox">
      <span class="slider"></span>
    </label>
  </div>

  <button id="openDashboardBtn">Панель управления</button>

  <script src="popup.js"></script>
</body>
</html>
